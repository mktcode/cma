#cloud-config

package_update: true
package_upgrade: true

packages:
  - certbot
  - fail2ban
  - git
  - isync
  - jq
  - mariadb-server
  - msmtp
  - nginx
  - nodejs
  - notmuch
  - npm
  - python3
  - python3-certbot-nginx
  - python3-pip
  - ripgrep
  - vim

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      ==============================================
      # Configure your agent's IMAP account in /root/.mbsyncrc
      vim /root/.mbsyncrc

      # Add generated SSH public key to your agent's git platform account (GitHub, GitLab, Gitea, etc.)
      cat /root/.ssh/id_ed25519.pub
      ==============================================
  # mbsync config
  - path: /root/.mbsyncrc
    permissions: "0600"
    content: |
      IMAPAccount myaccount
      Host imap.yourprovider.com
      User your@email.com
      Pass yourpassword
      Port 993
      SSLType IMAPS

      IMAPStore remote
      Account myaccount

      MaildirStore local
      Path ~/mail/
      Inbox ~/mail/Inbox/

      Channel inbox
      Far :remote:
      Near :local:
      Patterns *
      Create Near
      Sync All
      Expunge Both
      SyncState *

runcmd:
  - systemctl enable nginx
  - systemctl start nginx

  - systemctl enable fail2ban
  - systemctl start fail2ban

  - systemctl enable mariadb
  - systemctl start mariadb

  - ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N "" -C "root@$(hostname)"

  - npm install -g @mariozechner/pi-coding-agent
  - pi install git:github.com/mktcode/cma

  - mysql < /root/.pi/agent/git/github.com/mktcode/cma/schema.sql