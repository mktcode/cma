#cloud-config

package_update: true
package_upgrade: true

packages:
  - certbot
  - fail2ban
  - git
  - jq
  - mariadb-server
  - nginx
  - python3
  - python3-certbot-nginx
  - python3-pip

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      ==============================================
      Run `himalaya` to set up the agent's mailbox.
      Add generated SSH public key to your agent's git platform account (GitHub, GitLab, Gitea, etc.) to enable git operations.
      Set up the database server by running `mariadb-secure-installation` and following the prompts.
      Clone the cma repository: `cd ~ && git clone https://github.com/mktcode/cma.git .`
      Create the database by running `mysql -u root -p -e "CREATE DATABASE cma;"`.
      Import the initial database schema: `mysql -u root -p cma < ~/schema.sql`.
      Install openclaw:
        npm install -g openclaw@latest
        openclaw onboard --install-daemon
      ==============================================

runcmd:
  - systemctl enable nginx
  - systemctl start nginx

  - systemctl enable fail2ban
  - systemctl start fail2ban

  - systemctl enable mariadb
  - systemctl start mariadb

  - ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N "" -C "root@$(hostname)"

  - curl -sSL https://raw.githubusercontent.com/pimalaya/himalaya/master/install.sh | sh

  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash

  - bash -c 'export NVM_DIR="$HOME/.nvm" && \
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && \
      nvm install 24 && \
      nvm alias default 24'