#cloud-config

# for Debian-based distributions
# tested on Debian 13

package_update: true
package_upgrade: true

packages:
  - certbot
  - fail2ban
  - git
  - isync
  - jq
  - mariadb-server
  - msmtp
  - nginx
  - nodejs
  - notmuch
  - npm
  - python3
  - python3-certbot-nginx
  - python3-pip
  - ripgrep
  - supervisor
  - vim

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      ==============================================
      # Configure your agent's IMAP and SMTP account
      vim /root/.mbsyncrc
      vim /root/.msmtprc
      ==============================================
  - path: /root/.mbsyncrc
    permissions: "0600"
    content: |
      IMAPAccount myaccount
      Host imap.yourprovider.com
      User your@email.com
      Pass yourpassword
      Port 993
      SSLType IMAPS
      IMAPStore remote
      Account myaccount
      MaildirStore local
      Path ~/mail/
      Inbox ~/mail/Inbox/
      Channel inbox
      Far :remote:
      Near :local:
      Patterns *
      Create Near
      Sync All
      Expunge Both
      SyncState *
  - path: /root/.msmtprc
    permissions: "0600"
    content: |
      defaults
      auth           on
      tls            on
      tls_trust_file /etc/ssl/certs/ca-certificates.crt
      logfile        ~/.msmtp.log
      account        default
      host           smtp.yourprovider.com
      port           587
      from           your@email.com
      user           your@email.com
      password       yourpassword
  - path: /etc/supervisor/conf.d/cma.conf
    permissions: "0644"
    content: |
      [program:cma]
      command=/usr/bin/node /root/cma/dist/index.js
      autostart=true
      autorestart=true
      stderr_logfile=/var/log/cma.err.log
      stdout_logfile=/var/log/cma.out.log

runcmd:
  - npm install -g @mariozechner/pi-coding-agent

  - git clone https://github.com/mktcode/cma /root/cma
  - cd /root/cma && npm install && npm run build
  - mkdir -p /var/lib/cma/sessions

  - mkdir -p /root/.pi/agent/skills/website-editing
  - ln -s /root/cma/skills/website-editing /root/.pi/agent/skills/website-editing

  - systemctl enable nginx
  - systemctl start nginx

  - systemctl enable fail2ban
  - systemctl start fail2ban

  - systemctl enable mariadb
  - systemctl start mariadb

  - systemctl enable supervisor
  - systemctl start supervisor